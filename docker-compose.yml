services:
  anomaly-tracker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: crypto-anomaly-tracker
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      PORT: ${PORT:-8080}
      ANOMALY_OUTPUT_DIR: /app/outputs/live
      ANOMALY_STATE_PATH: /app/outputs/live/state.json
    ports:
      - "${PORT:-8080}:8080"
    volumes:
      - anomaly-tracker-data:/app/outputs/live
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health', timeout=5).read()"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  anomaly-tracker-data:
